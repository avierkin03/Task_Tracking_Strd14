{% extends 'base.html' %}
{% block content %}
    <h1>Delete Task</h1>
    <p>Are you sure you want to delete task "{{ object.title }}"</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes</button>
    </form>

    <a href="{% url 'task-list' %}">Return to task list page</a>
{% endblock %}
